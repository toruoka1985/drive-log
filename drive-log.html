<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --accent: #c8f53a;
    --accent2: #3af5b4;
    --accent3: #f5a23a;
    --text: #f0f0f0;
    --text2: #888;
    --text3: #555;
    --corp: #3af5b4;
    --self: #f5a23a;
    --priv: #888;
    --danger: #f55a3a;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    min-height: 100dvh;
    padding-bottom: env(safe-area-inset-bottom);
  }

  /* ── NAV ── */
  nav {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    padding-bottom: env(safe-area-inset-bottom);
    z-index: 100;
  }
  nav button {
    flex: 1;
    background: none;
    border: none;
    color: var(--text3);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 10px;
    padding: 8px 4px 6px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    transition: color .2s;
  }
  nav button.active { color: var(--accent); }
  nav button svg { width: 22px; height: 22px; }

  /* ── PAGES ── */
  .page { display: none; padding: 0 0 80px; min-height: 100dvh; }
  .page.active { display: block; }
  @media all and (display-mode: standalone) {
    .page { padding-bottom: calc(env(safe-area-inset-bottom) + 80px); }
  }

  /* ── HEADER ── */
  .header {
    padding: 56px 20px 20px;
    border-bottom: 1px solid var(--border);
  }
  @media all and (display-mode: standalone) {
    .header {
      padding: calc(env(safe-area-inset-top) - 8px) 20px 20px;
    }
  }
  .header h1 {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 400;
    color: var(--text3);
    letter-spacing: .15em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .header h2 {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -.02em;
  }

  /* ── FORM ── */
  .form-wrap { padding: 20px; display: flex; flex-direction: column; gap: 16px; }

  .field label {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--text2);
    margin-bottom: 8px;
  }
  .field input, .field textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    padding: 14px 16px;
    outline: none;
    transition: border-color .2s;
    -webkit-appearance: none;
  }
  .field input:focus, .field textarea:focus {
    border-color: var(--accent);
  }
  .field input.readonly-odo {
    color: var(--text2);
    font-size: 15px;
    pointer-events: none;
    user-select: none;
    -webkit-user-select: none;
  }

  .odo-row { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: end; }
  .edit-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text2);
    font-size: 11px;
    padding: 14px 12px;
    cursor: pointer;
    white-space: nowrap;
    font-family: 'Noto Sans JP', sans-serif;
    transition: all .2s;
  }
  .edit-btn.active { color: var(--accent); border-color: var(--accent); }

  .seg-wrap { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .seg-btn {
    background: var(--surface2);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    color: var(--text2);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 14px 4px;
    cursor: pointer;
    text-align: center;
    transition: all .2s;
  }
  .seg-btn[data-v="法人"].active  { background: rgba(58,245,180,.12); border-color: var(--corp); color: var(--corp); }
  .seg-btn[data-v="個人事業"].active { background: rgba(245,162,58,.12); border-color: var(--self); color: var(--self); }
  .seg-btn[data-v="私用"].active  { background: rgba(136,136,136,.12); border-color: var(--priv); color: var(--priv); }

  /* distance preview */
  .dist-preview {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .dist-preview .label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text3); letter-spacing: .1em; text-transform: uppercase; }
  .dist-preview .value { font-family: 'DM Mono', monospace; font-size: 20px; color: var(--accent); }

  /* submit btn */
  .submit-btn {
    width: 100%;
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    color: #0f0f0f;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 15px;
    font-weight: 700;
    padding: 16px;
    cursor: pointer;
    transition: opacity .2s, transform .1s;
    letter-spacing: .04em;
  }
  .submit-btn:active { transform: scale(.98); opacity: .85; }
  .submit-btn:disabled { opacity: .3; }

  /* ── RECORDS ── */
  .records-wrap { padding: 0 20px 20px; }
  .month-group { margin-top: 24px; }
  .month-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .record-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 8px;
    position: relative;
    overflow: hidden;
  }
  .record-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
  }
  .record-card.法人::before  { background: var(--corp); }
  .record-card.個人事業::before { background: var(--self); }
  .record-card.私用::before  { background: var(--priv); }

  .record-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
  .record-date { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text2); }
  .record-cat {
    font-size: 10px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 4px;
  }
  .record-card.法人 .record-cat  { background: rgba(58,245,180,.15); color: var(--corp); }
  .record-card.個人事業 .record-cat { background: rgba(245,162,58,.15); color: var(--self); }
  .record-card.私用 .record-cat  { background: rgba(136,136,136,.15); color: var(--priv); }

  .record-purpose { font-size: 14px; font-weight: 500; margin-bottom: 6px; }
  .record-odo {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text2);
  }
  .record-bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }
  .record-km { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text); }
  .record-cost { font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 500; }
  .record-card.法人 .record-cost  { color: var(--corp); }
  .record-card.個人事業 .record-cost { color: var(--self); }
  .record-card.私用 .record-cost  { color: var(--priv); }

  .del-btn {
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    padding: 4px 6px;
    font-size: 13px;
    line-height: 1;
    border-radius: 4px;
    flex-shrink: 0;
  }
  .del-btn:hover { color: var(--danger); }

  /* カードのアクションバー（下部） */
  .record-actions {
    display: flex;
    justify-content: flex-end;
    gap: 6px;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }
  .action-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text2);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 11px;
    padding: 6px 12px;
    cursor: pointer;
    transition: all .15s;
  }
  .action-btn:active { opacity: .7; }
  .action-btn.danger { color: var(--danger); border-color: rgba(245,90,58,.3); }

  /* 編集モーダル */
  .edit-modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.75);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
    padding: 0;
  }
  .edit-modal-overlay.show { display: flex; }
  .edit-modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    padding: 24px 20px 40px;
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .edit-modal-title {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 4px;
  }
  .edit-modal-btns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 4px;
  }
  .edit-modal-btns .btn-save {
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: #0f0f0f;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    font-weight: 700;
    padding: 14px;
    cursor: pointer;
  }
  .edit-modal-btns .btn-cancel {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    padding: 14px;
    cursor: pointer;
  }

  .empty-msg {
    text-align: center;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 40px 0;
    letter-spacing: .08em;
  }

  /* ── SUMMARY ── */
  .summary-wrap { padding: 0 20px 20px; }
  .month-selector {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 20px 0;
  }
  .month-selector button {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 18px;
    width: 40px; height: 40px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .month-selector span {
    flex: 1;
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    letter-spacing: .06em;
  }

  .summary-cards { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
  }
  .summary-card .sc-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .summary-card .sc-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: .14em;
    text-transform: uppercase;
  }
  .summary-card.法人 .sc-label  { color: var(--corp); }
  .summary-card.個人事業 .sc-label { color: var(--self); }
  .summary-card.私用 .sc-label  { color: var(--priv); }
  .summary-card .sc-km {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text2);
  }
  .summary-card .sc-cost {
    font-family: 'DM Mono', monospace;
    font-size: 28px;
    font-weight: 500;
  }
  .summary-card.法人 .sc-cost  { color: var(--corp); }
  .summary-card.個人事業 .sc-cost { color: var(--self); }
  .summary-card.私用 .sc-cost  { color: var(--priv); }
  .summary-card .sc-note {
    font-size: 11px;
    color: var(--text3);
    margin-top: 4px;
  }

  .total-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    margin-top: 4px;
  }
  .total-card .t-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--text2);
    margin-bottom: 8px;
  }
  .total-card .t-amount {
    font-family: 'DM Mono', monospace;
    font-size: 32px;
    color: var(--accent);
  }

  .rate-preview {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text2);
    line-height: 1.8;
    margin-top: 4px;
  }
  .rate-preview .r-formula { color: var(--accent); font-size: 13px; font-weight: 500; }

  .settings-save-btn {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text2);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 16px;
    cursor: pointer;
    margin-top: 24px;
    transition: all .2s;
    letter-spacing: .04em;
  }
  .settings-save-btn:active { opacity: .7; transform: scale(.98); }

  .settings-section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  /* export buttons */
  .export-wrap {
    margin-top: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .csv-btn {
    opacity: .6;
    margin-top: 12px;
  }
  .csv-btn svg { color: var(--text2) !important; }
  .csv-btn:active { opacity: .4; }
  .export-btn {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 15px;
    font-weight: 600;
    padding: 18px 20px;
    cursor: pointer;
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: all .2s;
    letter-spacing: .02em;
  }
  .export-btn:active { opacity: .7; transform: scale(.98); }
  .export-btn svg { width: 22px; height: 22px; color: var(--accent); flex-shrink: 0; }
  .export-btn .export-sub { color: var(--text3); font-size: 10px; font-family: 'DM Mono', monospace; letter-spacing: .1em; margin-left: 4px; }
  .export-btn.issued {
    background: rgba(200,245,58,.08);
    border-color: var(--accent);
  }
  .export-btn.issued svg { color: var(--accent); }
  .export-btn.issued #invoice-btn-label { color: var(--accent); }
  .export-btn.issued #invoice-btn-sub { color: var(--accent); opacity: .6; }

    </svg>

<script>
const RATE = 300; // フォールバック用（設定未保存時）
let records = JSON.parse(localStorage.getItem('driveRecords') || '[]');
let editStartEnabled = false;
let deleteTargetId = null;
let editTargetId = null;
let summaryMonth = new Date();

// ── 料金計算 ──
function calcCost(km, overrideRate) {
  const r = overrideRate != null ? overrideRate : (settings.ratePerKm != null ? settings.ratePerKm : RATE);
  const base = settings.baseFixed || 0;
  const cap = settings.capAmount || 0;
  let cost = base + Math.round(km * r);
  if (cap > 0) cost = Math.min(cost, cap);
  return cost;
}

// ── INIT ──
window.addEventListener('DOMContentLoaded', () => {
  const today = new Date();
  const y = today.getFullYear();
  const m = String(today.getMonth() + 1).padStart(2, '0');
  const d = String(today.getDate()).padStart(2, '0');
  document.getElementById('f-date').value = `${y}-${m}-${d}`;

  setLastOdo();
  renderHistory();
  renderSummary();
  loadSettings();
  ['s-rate','s-base','s-cap'].forEach(id => {
    document.getElementById(id).addEventListener('input', updateRatePreview);
  });
});

function setLastOdo() {
  if (records.length === 0) return;
  const last = records[records.length - 1];
  const input = document.getElementById('f-odo-start');
  input.value = last.odoEnd;
  input.classList.add('readonly-odo');
  updatePreview();
}

// ── PAGE ──
function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'history') renderHistory();
  if (name === 'summary') renderSummary();
}

// ── CATEGORY ──
function selectCat(btn) {
  document.querySelectorAll('.seg-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}
function getCategory() {
  const btn = document.querySelector('.seg-btn.active');
  return btn ? btn.dataset.v : null;
}

// ── EDIT START ──
function toggleEditStart() {
  editStartEnabled = !editStartEnabled;
  const input = document.getElementById('f-odo-start');
  const btn = document.getElementById('edit-start-btn');
  if (editStartEnabled) {
    input.classList.remove('readonly-odo');
    btn.classList.add('active');
    btn.textContent = '確定';
    setTimeout(() => { input.focus(); input.select(); }, 50);
  } else {
    input.classList.add('readonly-odo');
    input.blur();
    btn.classList.remove('active');
    btn.textContent = '編集';
    updatePreview();
  }
}

// ── PREVIEW ──
function updatePreview() {
  const start = parseFloat(document.getElementById('f-odo-start').value);
  const end = parseFloat(document.getElementById('f-odo-end').value);
  const el = document.getElementById('preview-km');
  if (!isNaN(start) && !isNaN(end) && end > start) {
    el.textContent = (end - start).toFixed(1) + ' km';
  } else {
    el.textContent = '— km';
  }
}

// ── SAVE ──
function saveRecord() {
  const date = document.getElementById('f-date').value;
  const purpose = document.getElementById('f-purpose').value.trim();
  const cat = getCategory();
  const start = parseFloat(document.getElementById('f-odo-start').value);
  const end = parseFloat(document.getElementById('f-odo-end').value);

  if (!date || !purpose || !cat) { toast('日付・目的・費用区分を入力してください'); return; }
  if (isNaN(start) || isNaN(end)) { toast('オドメーターを入力してください'); return; }
  if (end <= start) { toast('終了値は開始値より大きくしてください'); return; }

  const km = end - start;
  const cost = calcCost(km, null);
  const record = {
    id: Date.now(),
    date, purpose,
    category: cat,
    odoStart: start,
    odoEnd: end,
    km: parseFloat(km.toFixed(1)),
    cost,
    customRate: null
  };

  records.push(record);
  save();
  const ry = new Date(record.date).getFullYear();
  const rm = new Date(record.date).getMonth() + 1;
  markDirtyIfChanged(ry, rm);
  toast('記録しました ✓');

  document.getElementById('f-purpose').value = '';
  document.getElementById('f-odo-end').value = '';
  const startInput = document.getElementById('f-odo-start');
  startInput.value = end;
  startInput.classList.add('readonly-odo');
  document.querySelectorAll('.seg-btn').forEach(b => b.classList.remove('active'));
  updatePreview();

  if (editStartEnabled) {
    editStartEnabled = false;
    document.getElementById('edit-start-btn').classList.remove('active');
    document.getElementById('edit-start-btn').textContent = '編集';
  }
}

// ── SAVE/LOAD ──
function save() {
  localStorage.setItem('driveRecords', JSON.stringify(records));
}

// ── HISTORY ──
function renderHistory() {
  const wrap = document.getElementById('records-wrap');
  if (records.length === 0) {
    wrap.innerHTML = '<p class="empty-msg">NO RECORDS YET</p>';
    return;
  }
  const groups = {};
  [...records].reverse().forEach(r => {
    const m = r.date.slice(0, 7);
    if (!groups[m]) groups[m] = [];
    groups[m].push(r);
  });

  let html = '';
  Object.entries(groups).sort((a,b) => b[0].localeCompare(a[0])).forEach(([month, recs]) => {
    const [y, m] = month.split('-');
    html += `<div class="month-group"><div class="month-label">${y}年 ${parseInt(m)}月</div>`;
    recs.forEach(r => {
      html += `<div class="record-card ${r.category}">
        <div class="record-top">
          <span class="record-date">${formatDate(r.date)}</span>
          <span class="record-cat">${r.category}</span>
        </div>
        <div class="record-purpose">${escHtml(r.purpose)}</div>
        <div class="record-odo">${r.odoStart.toLocaleString()} → ${r.odoEnd.toLocaleString()} km</div>
        <div class="record-bottom">
          <span class="record-km">${r.km.toFixed(1)} km</span>
          <span class="record-cost">¥${r.cost.toLocaleString()}</span>
        </div>
        <div class="record-actions">
          <button class="action-btn" onclick="openEditModal(${r.id})">編集</button>
          <button class="action-btn danger" onclick="askDelete(${r.id})">削除</button>
        </div>
      </div>`;
    });
    html += `</div>`;
  });
  wrap.innerHTML = html;
}

// ── SUMMARY ──
function renderSummary() {
  const y = summaryMonth.getFullYear();
  const m = summaryMonth.getMonth() + 1;
  const key = `${y}-${String(m).padStart(2,'0')}`;
  document.getElementById('summary-month-label').textContent = `${y}年 ${m}月`;

  const monthRecs = records.filter(r => r.date.startsWith(key));
  const cats = ['法人', '個人事業', '私用'];
  const notes = {
    '法人': '参考値（法人業務のため精算不要）',
    '個人事業': '事業経費として計上',
    '私用': '自己負担'
  };

  let totalCost = 0;
  let cardsHtml = '';

  cats.forEach(cat => {
    const recs = monthRecs.filter(r => r.category === cat);
    const km = recs.reduce((s, r) => s + r.km, 0);
    const cost = recs.reduce((s, r) => s + r.cost, 0);
    if (cat !== '法人') totalCost += cost;

function closeEditModal() {

function selectEditCat(btn) {

function updateEditPreview() {
  const start = parseFloat(document.getElementById('e-odo-start').value);
  const end = parseFloat(document.getElementById('e-odo-end').value);
  const el = document.getElementById('e-preview-km');
  const hint = document.getElementById('e-cost-hint');
  const costInput = document.getElementById('e-custom-cost');

    const km = end - start;
    el.textContent = km.toFixed(1) + ' km';
    const autoCost = calcCost(km, null);

      hint.textContent = '自動計算：¥' + autoCost.toLocaleString();
    }

    el.textContent = '— km';
    hint.textContent = '';

function onEditCostInput() {
  const lock = document.getElementById('e-cost-lock');
  const hint = document.getElementById('e-cost-hint');
  const val = document.getElementById('e-custom-cost').value;
  if (val === '') {
    lock.textContent = 'AUTO';
    lock.style.color = 'var(--text3)';

    lock.textContent = 'FIXED';
    lock.style.color = 'var(--self)';

function resetEditCost() {

function saveEdit() {
  const date = document.getElementById('e-date').value;
  const purpose = document.getElementById('e-purpose').value.trim();
  const cat = document.querySelector('.edit-seg.active')?.dataset.v;
  const start = parseFloat(document.getElementById('e-odo-start').value);
  const end = parseFloat(document.getElementById('e-odo-end').value);

  if (!date || !purpose || !cat) { toast('日付・目的・費用区分を入力してください'); return; }
  if (isNaN(start) || isNaN(end)) { toast('オドメーターを入力してください'); return; }
  if (end <= start) { toast('終了値は開始値より大きくしてください'); return; }

  const km = end - start;
  const customCostVal = document.getElementById('e-custom-cost').value.trim();
  const hasCustom = customCostVal !== '' && !isNaN(Number(customCostVal));
  const cost = hasCustom ? Math.round(Number(customCostVal)) : calcCost(km, null);
  const updated = {
    id: editTargetId, date, purpose, category: cat,
    odoStart: start, odoEnd: end,
    km: parseFloat(km.toFixed(1)),
    cost,
    customRate: hasCustom ? true : null
  };

  records = records.map(r => r.id === editTargetId ? updated : r);
  save();
  const ey = new Date(updated.date).getFullYear();
  const em = new Date(updated.date).getMonth() + 1;
  markDirtyIfChanged(ey, em);
  closeEditModal();
  renderHistory();
  toast('更新しました ✓');
}

}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');

}
function confirmDelete() {
  const target = records.find(r => r.id === deleteTargetId);
  records = records.filter(r => r.id !== deleteTargetId);
  save();
  if (target) {
    const dy = new Date(target.date).getFullYear();

    markDirtyIfChanged(dy, dm);

// ── CSV EXPORT ──
async function exportCSV() {
  if (records.length === 0) { toast('データがありません'); return; }
  const header = '日付,目的,費用区分,開始オドメーター,終了オドメーター,走行距離(km),金額(円)';
  const rows = [...records].sort((a,b) => a.date.localeCompare(b.date)).map(r =>
    `${r.date},${r.purpose},${r.category},${r.odoStart},${r.odoEnd},${r.km},${r.cost}`
  );
  const csv = '\uFEFF' + [header, ...rows].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const t = new Date();
  const fname = `${t.getFullYear()}${String(t.getMonth()+1).padStart(2,'0')}${String(t.getDate()).padStart(2,'0')}_走行記録_全履歴.csv`;
  const file = new File([blob], fname, { type: 'text/csv' });
  try {
    if (navigator.share && navigator.canShare({ files: [file] })) {
      await navigator.share({ files: [file], title: fname });
    } else {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = fname;
      a.click();
    }
    toast('CSV出力しました ✓');
  } catch(e) {
    if (e.name !== 'AbortError') toast('出力に失敗しました');
  }
}

// ── INVOICE STATUS ──
function getInvoiceKey(y, m) {
  return `invoice_${y}_${String(m).padStart(2,'0')}`;
}
function getInvoiceStatus(y, m) {
  return JSON.parse(localStorage.getItem(getInvoiceKey(y, m)) || 'null');
}
function setInvoiceIssued(y, m) {
  const hash = getMonthHash(y, m);
  localStorage.setItem(getInvoiceKey(y, m), JSON.stringify({ issued: true, hash }));
}
function getMonthHash(y, m) {
  const key = `${y}-${String(m).padStart(2,'0')}`;
  const monthRecs = records.filter(r => r.date.startsWith(key));
  return monthRecs.map(r => `${r.id}-${r.km}-${r.cost}`).join('|');
}
function markDirtyIfChanged(y, m) {
  const status = getInvoiceStatus(y, m);
  if (!status || !status.issued) return;
  const currentHash = getMonthHash(y, m);
  if (currentHash !== status.hash) {
    localStorage.setItem(getInvoiceKey(y, m), JSON.stringify({ issued: true, dirty: true, hash: status.hash }));
  }
}
function updateInvoiceBtn() {
  const y = summaryMonth.getFullYear();
  const m = summaryMonth.getMonth() + 1;
  const status = getInvoiceStatus(y, m);
  const btn = document.getElementById('invoice-btn');
  const label = document.getElementById('invoice-btn-label');
  const sub = document.getElementById('invoice-btn-sub');
  if (!btn) return;

  btn.classList.remove('issued', 'needs-reissue');
  if (!status || !status.issued) {
    label.textContent = '請求書を発行';
    sub.textContent = 'EXPORT INVOICE';
  } else if (status.dirty) {
    btn.classList.add('needs-reissue');
    label.textContent = '再発行が必要です';
    sub.textContent = 'NEEDS REISSUE';
  } else {
    btn.classList.add('issued');
    label.textContent = '発行済み（再発行）';
    sub.textContent = 'ISSUED ✓';
  }
}

function loadSettings() {
  document.getElementById('s-rate').value = settings.ratePerKm != null ? settings.ratePerKm : 300;
  document.getElementById('s-base').value = settings.baseFixed || '';
  document.getElementById('s-cap').value = settings.capAmount || '';
  document.getElementById('s-company').value = settings.company || '';
  document.getElementById('s-name').value = settings.name || '';
  document.getElementById('s-address').value = settings.address || '';
  document.getElementById('s-bank-name').value = settings.bankName || '';
  document.getElementById('s-bank-type').value = settings.bankType || '';
  document.getElementById('s-bank-holder').value = settings.bankHolder || '';
  updateRatePreview();
}

function updateRatePreview() {
  const rate = parseFloat(document.getElementById('s-rate').value) || 0;
  const base = parseFloat(document.getElementById('s-base').value) || 0;
  const cap  = parseFloat(document.getElementById('s-cap').value)  || 0;
  const el = document.getElementById('rate-preview');
  if (!el) return;
  let formula = '';
  if (base > 0 && rate > 0) formula = `¥${base.toLocaleString()} + km × ¥${rate}`;
  else if (rate > 0)         formula = `km × ¥${rate}`;
  else if (base > 0)         formula = `¥${base.toLocaleString()}（固定）`;
  else                       formula = '—';
  if (cap > 0) formula += ` （上限 ¥${cap.toLocaleString()}）`;
  const ex100 = (() => { let c = base + rate * 100; if (cap > 0) c = Math.min(c, cap); return Math.round(c); })();
  el.innerHTML = `<div class="r-formula">${formula}</div><div style="margin-top:4px;color:var(--text3);">例：100km → ¥${ex100.toLocaleString()}</div>`;
}

function saveSettings() {
  settings = {

    baseFixed:   parseFloat(document.getElementById('s-base').value) || 0,

              const a = document.createElement('a');
              a.href = imgUrl;
              a.download = `${y}${String(m).padStart(2,'0')}_自動車利用料金請求書.png`;
              a.click();
            }
            setInvoiceIssued(y, m);
            updateInvoiceBtn();
            closePreview();
            toast('請求書を共有しました ✓');
          } catch(e) {
            if (e.name !== 'AbortError') toast('共有に失敗しました');
          }
        };
        document.getElementById('preview-reshare-btn').onclick = doShare;
      }, 'image/png');
    } catch(e) {
      if (document.body.contains(iframe)) document.body.removeChild(iframe);
      toast('生成に失敗しました');
      console.error(e);
    }
  };
}

// ── PREVIEW ──
function closePreview() {
  document.getElementById('previewOverlay').classList.remove('show');
  const img = document.getElementById('preview-img');
  if (img.src) URL.revokeObjectURL(img.src);
  img.src = '';
}

// ── TOAST ──
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

// ── UTILS ──
function formatDate(s) {
  const d = new Date(s + 'T00:00:00');
  return `${d.getMonth()+1}/${d.getDate()}(${['日','月','火','水','木','金','土'][d.getDay()]})`;
}
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
