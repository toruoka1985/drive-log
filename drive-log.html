<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="走行記録">
<title>社有車 走行記録</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --accent: #c8f53a;
    --accent2: #3af5b4;
    --accent3: #f5a23a;
    --text: #f0f0f0;
    --text2: #888;
    --text3: #555;
    --corp: #3af5b4;
    --self: #f5a23a;
    --priv: #888;
    --danger: #f55a3a;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    min-height: 100dvh;
    padding-bottom: env(safe-area-inset-bottom);
  }

  /* ── NAV ── */
  nav {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    padding-bottom: env(safe-area-inset-bottom);
    z-index: 100;
  }
  nav button {
    flex: 1;
    background: none;
    border: none;
    color: var(--text3);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 10px;
    padding: 10px 4px 8px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    transition: color .2s;
  }
  nav button.active { color: var(--accent); }
  nav button svg { width: 22px; height: 22px; }

  /* ── PAGES ── */
  .page { display: none; padding: 0 0 80px; min-height: 100dvh; }
  .page.active { display: block; }

  /* ── HEADER ── */
  .header {
    padding: 56px 20px 20px;
    border-bottom: 1px solid var(--border);
  }
  .header h1 {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 400;
    color: var(--text3);
    letter-spacing: .15em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .header h2 {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -.02em;
  }

  /* ── FORM ── */
  .form-wrap { padding: 20px; display: flex; flex-direction: column; gap: 16px; }

  .field label {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--text2);
    margin-bottom: 8px;
  }
  .field input, .field textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    padding: 14px 16px;
    outline: none;
    transition: border-color .2s;
    -webkit-appearance: none;
  }
  .field input:focus, .field textarea:focus {
    border-color: var(--accent);
  }
  .field input.readonly-odo {
    color: var(--text2);
    font-size: 15px;
    pointer-events: none;
    user-select: none;
    -webkit-user-select: none;
  }

  .odo-row { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: end; }
  .edit-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text2);
    font-size: 11px;
    padding: 14px 12px;
    cursor: pointer;
    white-space: nowrap;
    font-family: 'Noto Sans JP', sans-serif;
    transition: all .2s;
  }
  .edit-btn.active { color: var(--accent); border-color: var(--accent); }

  .seg-wrap { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .seg-btn {
    background: var(--surface2);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    color: var(--text2);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 14px 4px;
    cursor: pointer;
    text-align: center;
    transition: all .2s;
  }
  .seg-btn[data-v="法人"].active  { background: rgba(58,245,180,.12); border-color: var(--corp); color: var(--corp); }
  .seg-btn[data-v="個人事業"].active { background: rgba(245,162,58,.12); border-color: var(--self); color: var(--self); }
  .seg-btn[data-v="私用"].active  { background: rgba(136,136,136,.12); border-color: var(--priv); color: var(--priv); }

  /* distance preview */
  .dist-preview {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .dist-preview .label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text3); letter-spacing: .1em; text-transform: uppercase; }
  .dist-preview .value { font-family: 'DM Mono', monospace; font-size: 20px; color: var(--accent); }

  /* submit btn */
  .submit-btn {
    width: 100%;
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    color: #0f0f0f;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 15px;
    font-weight: 700;
    padding: 16px;
    cursor: pointer;
    transition: opacity .2s, transform .1s;
    letter-spacing: .04em;
  }
  .submit-btn:active { transform: scale(.98); opacity: .85; }
  .submit-btn:disabled { opacity: .3; }

  /* ── RECORDS ── */
  .records-wrap { padding: 0 20px 20px; }
  .month-group { margin-top: 24px; }
  .month-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .record-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 8px;
    position: relative;
    overflow: hidden;
  }
  .record-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
  }
  .record-card.法人::before  { background: var(--corp); }
  .record-card.個人事業::before { background: var(--self); }
  .record-card.私用::before  { background: var(--priv); }

  .record-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
  .record-date { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text2); }
  .record-cat {
    font-size: 10px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 4px;
  }
  .record-card.法人 .record-cat  { background: rgba(58,245,180,.15); color: var(--corp); }
  .record-card.個人事業 .record-cat { background: rgba(245,162,58,.15); color: var(--self); }
  .record-card.私用 .record-cat  { background: rgba(136,136,136,.15); color: var(--priv); }

  .record-purpose { font-size: 14px; font-weight: 500; margin-bottom: 6px; }
  .record-odo {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text2);
  }
  .record-bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }
  .record-km { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text); }
  .record-cost { font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 500; }
  .record-card.法人 .record-cost  { color: var(--corp); }
  .record-card.個人事業 .record-cost { color: var(--self); }
  .record-card.私用 .record-cost  { color: var(--priv); }

  .del-btn {
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    padding: 4px 6px;
    font-size: 13px;
    line-height: 1;
    border-radius: 4px;
    flex-shrink: 0;
  }
  .del-btn:hover { color: var(--danger); }

  /* カードのアクションバー（下部） */
  .record-actions {
    display: flex;
    justify-content: flex-end;
    gap: 6px;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }
  .action-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text2);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 11px;
    padding: 6px 12px;
    cursor: pointer;
    transition: all .15s;
  }
  .action-btn:active { opacity: .7; }
  .action-btn.danger { color: var(--danger); border-color: rgba(245,90,58,.3); }

  /* 編集モーダル */
  .edit-modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.75);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
    padding: 0;
  }
  .edit-modal-overlay.show { display: flex; }
  .edit-modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    padding: 24px 20px 40px;
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .edit-modal-title {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 4px;
  }
  .edit-modal-btns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 4px;
  }
  .edit-modal-btns .btn-save {
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: #0f0f0f;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    font-weight: 700;
    padding: 14px;
    cursor: pointer;
  }
  .edit-modal-btns .btn-cancel {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    padding: 14px;
    cursor: pointer;
  }

  .empty-msg {
    text-align: center;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 40px 0;
    letter-spacing: .08em;
  }

  /* ── SUMMARY ── */
  .summary-wrap { padding: 0 20px 20px; }
  .month-selector {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 20px 0;
  }
  .month-selector button {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 18px;
    width: 40px; height: 40px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .month-selector span {
    flex: 1;
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    letter-spacing: .06em;
  }

  .summary-cards { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
  }
  .summary-card .sc-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .summary-card .sc-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: .14em;
    text-transform: uppercase;
  }
  .summary-card.法人 .sc-label  { color: var(--corp); }
  .summary-card.個人事業 .sc-label { color: var(--self); }
  .summary-card.私用 .sc-label  { color: var(--priv); }
  .summary-card .sc-km {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text2);
  }
  .summary-card .sc-cost {
    font-family: 'DM Mono', monospace;
    font-size: 28px;
    font-weight: 500;
  }
  .summary-card.法人 .sc-cost  { color: var(--corp); }
  .summary-card.個人事業 .sc-cost { color: var(--self); }
  .summary-card.私用 .sc-cost  { color: var(--priv); }
  .summary-card .sc-note {
    font-size: 11px;
    color: var(--text3);
    margin-top: 4px;
  }

  .total-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    margin-top: 4px;
  }
  .total-card .t-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--text2);
    margin-bottom: 8px;
  }
  .total-card .t-amount {
    font-family: 'DM Mono', monospace;
    font-size: 32px;
    color: var(--accent);
  }

  /* export buttons */
  .export-wrap {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 20px;
  }
  .export-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 14px 10px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    transition: all .2s;
  }
  .export-btn:active { opacity: .7; transform: scale(.97); }
  .export-btn svg { width: 20px; height: 20px; color: var(--accent); }
  .export-btn span { color: var(--text2); font-size: 10px; font-family: 'DM Mono', monospace; letter-spacing: .06em; }

  .detail-title {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--text3);
    margin: 20px 0 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  /* toast */
  .toast {
    position: fixed;
    top: 60px;
    left: 50%;
    transform: translateX(-50%) translateY(-10px);
    background: var(--accent);
    color: #0f0f0f;
    font-size: 13px;
    font-weight: 600;
    padding: 10px 20px;
    border-radius: 20px;
    opacity: 0;
    transition: all .3s;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* confirm modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    width: 100%;
    max-width: 320px;
  }
  .modal h3 { font-size: 16px; margin-bottom: 8px; }
  .modal p { font-size: 13px; color: var(--text2); margin-bottom: 20px; }
  .modal-btns { display: flex; gap: 10px; }
  .modal-btns button {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    cursor: pointer;
  }
  .modal-btns .btn-cancel { background: var(--surface2); color: var(--text); }
  .modal-btns .btn-delete { background: var(--danger); color: #fff; border-color: var(--danger); }
</style>
</head>
<body>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- CONFIRM MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>記録を削除しますか？</h3>
    <p>この操作は元に戻せません。</p>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-delete" onclick="confirmDelete()">削除する</button>
    </div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="edit-modal-overlay" id="editModalOverlay">
  <div class="edit-modal">
    <div class="edit-modal-title">記録を編集</div>

    <div class="field">
      <label>日付</label>
      <input type="date" id="e-date">
    </div>
    <div class="field">
      <label>目的</label>
      <input type="text" id="e-purpose" placeholder="例：○○訪問、納品など">
    </div>
    <div class="field">
      <label>費用区分</label>
      <div class="seg-wrap">
        <button class="seg-btn edit-seg" data-v="法人" onclick="selectEditCat(this)">法人</button>
        <button class="seg-btn edit-seg" data-v="個人事業" onclick="selectEditCat(this)">個人事業</button>
        <button class="seg-btn edit-seg" data-v="私用" onclick="selectEditCat(this)">私用</button>
      </div>
    </div>
    <div class="field">
      <label>開始オドメーター (km)</label>
      <input type="number" id="e-odo-start" inputmode="numeric" oninput="updateEditPreview()">
    </div>
    <div class="field">
      <label>終了オドメーター (km)</label>
      <input type="number" id="e-odo-end" inputmode="numeric" oninput="updateEditPreview()">
    </div>
    <div class="dist-preview">
      <span class="label">走行距離</span>
      <span class="value" id="e-preview-km">— km</span>
    </div>

    <div class="edit-modal-btns">
      <button class="btn-cancel" onclick="closeEditModal()">キャンセル</button>
      <button class="btn-save" onclick="saveEdit()">保存する</button>
    </div>
  </div>
</div>

<!-- PAGE: 記録 -->
<div class="page active" id="page-record">
  <div class="header">
    <h1>Drive Log</h1>
    <h2>走行記録</h2>
  </div>
  <div class="form-wrap">

    <div class="field">
      <label>日付</label>
      <input type="date" id="f-date">
    </div>

    <div class="field">
      <label>目的</label>
      <input type="text" id="f-purpose" placeholder="例：○○訪問、納品など">
    </div>

    <div class="field">
      <label>費用区分</label>
      <div class="seg-wrap">
        <button class="seg-btn" data-v="法人" onclick="selectCat(this)">法人</button>
        <button class="seg-btn" data-v="個人事業" onclick="selectCat(this)">個人事業</button>
        <button class="seg-btn" data-v="私用" onclick="selectCat(this)">私用</button>
      </div>
    </div>

    <div class="field">
      <label>開始オドメーター (km)</label>
      <div class="odo-row">
        <input type="number" id="f-odo-start" class="readonly-odo" inputmode="numeric" placeholder="前回終了値">
        <button class="edit-btn" id="edit-start-btn" onclick="toggleEditStart()">編集</button>
      </div>
    </div>

    <div class="field">
      <label>終了オドメーター (km)</label>
      <input type="number" id="f-odo-end" placeholder="000000" inputmode="numeric" oninput="updatePreview()">
    </div>

    <div class="dist-preview">
      <span class="label">走行距離</span>
      <span class="value" id="preview-km">— km</span>
    </div>

    <button class="submit-btn" id="submit-btn" onclick="saveRecord()">記録する</button>
  </div>
</div>

<!-- PAGE: 履歴 -->
<div class="page" id="page-history">
  <div class="header">
    <h1>History</h1>
    <h2>履歴</h2>
  </div>
  <div class="records-wrap" id="records-wrap"></div>
</div>

<!-- PAGE: 集計 -->
<div class="page" id="page-summary">
  <div class="header">
    <h1>Monthly Summary</h1>
    <h2>月次集計</h2>
  </div>
  <div class="summary-wrap">
    <div class="month-selector">
      <button onclick="changeMonth(-1)">‹</button>
      <span id="summary-month-label"></span>
      <button onclick="changeMonth(1)">›</button>
    </div>
    <div id="summary-content"></div>
    <div class="export-wrap">
      <button class="export-btn" onclick="exportCSV('month')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M12 3v13M7 11l5 5 5-5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M4 20h16" stroke-linecap="round"/>
        </svg>
        この月をCSV保存
        <span>EXPORT MONTH</span>
      </button>
      <button class="export-btn" onclick="exportCSV('all')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M12 3v13M7 11l5 5 5-5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M4 20h16" stroke-linecap="round"/>
        </svg>
        全データをCSV保存
        <span>EXPORT ALL</span>
      </button>
    </div>
  </div>
</div>

<!-- NAV -->
<nav>
  <button class="active" onclick="showPage('record', this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <path d="M12 5v14M5 12h14" stroke-linecap="round"/>
    </svg>
    記録
  </button>
  <button onclick="showPage('history', this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <rect x="3" y="4" width="18" height="18" rx="2"/>
      <path d="M7 9h10M7 13h6" stroke-linecap="round"/>
    </svg>
    履歴
  </button>
  <button onclick="showPage('summary', this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <path d="M4 20V14M9 20V10M14 20V6M19 20V4" stroke-linecap="round"/>
    </svg>
    集計
  </button>
</nav>

<script>
const RATE = 300;
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxNRIZnoBGVgKkpEO3O1YOgzAlq1XzrU7_UJJANoE9pTc3_tG0KCtKPvqXh-z8XDBU6fA/exec';
const SECRET = 'drivelog2026';

let records = [];
let editStartEnabled = false;
let deleteTargetId = null;
let editTargetId = null;
let summaryMonth = new Date();

// ── API ──
async function apiGet(params) {
  const url = new URL(GAS_URL);
  url.searchParams.set('secret', SECRET);
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
  const res = await fetch(url.toString());
  return res.json();
}

async function apiPost(body) {
  const res = await fetch(GAS_URL, {
    method: 'POST',
    body: JSON.stringify({ secret: SECRET, ...body })
  });
  return res.json();
}

// ── INIT ──
window.addEventListener('DOMContentLoaded', async () => {
  const today = new Date();
  const y = today.getFullYear();
  const m = String(today.getMonth() + 1).padStart(2, '0');
  const d = String(today.getDate()).padStart(2, '0');
  document.getElementById('f-date').value = `${y}-${m}-${d}`;

  setLoading(true);
  try {
    const data = await apiGet({ action: 'getAll' });
    records = (data.records || []).map(normalizeRecord);
    records.sort((a, b) => a.date.localeCompare(b.date));
  } catch(e) {
    toast('データ読込に失敗しました');
  }
  setLoading(false);
  setLastOdo();
  renderHistory();
  renderSummary();
});

function normalizeRecord(r) {
  return {
    id: Number(r.id),
    date: r.date,
    purpose: r.purpose,
    category: r.category,
    odoStart: Number(r.odoStart),
    odoEnd: Number(r.odoEnd),
    km: Number(r.km),
    cost: Number(r.cost)
  };
}

function setLoading(on) {
  document.getElementById('submit-btn').disabled = on;
  document.getElementById('submit-btn').textContent = on ? '通信中…' : '記録する';
}

function setLastOdo() {
  if (records.length === 0) return;
  const last = records[records.length - 1];
  const input = document.getElementById('f-odo-start');
  input.value = last.odoEnd;
  input.classList.add('readonly-odo');
  updatePreview();
}

// ── PAGE ──
function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'history') renderHistory();
  if (name === 'summary') renderSummary();
}

// ── CATEGORY ──
function selectCat(btn) {
  document.querySelectorAll('.seg-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}
function getCategory() {
  const btn = document.querySelector('.seg-btn.active');
  return btn ? btn.dataset.v : null;
}

// ── EDIT START ──
function toggleEditStart() {
  editStartEnabled = !editStartEnabled;
  const input = document.getElementById('f-odo-start');
  const btn = document.getElementById('edit-start-btn');
  if (editStartEnabled) {
    input.classList.remove('readonly-odo');
    btn.classList.add('active');
    btn.textContent = '確定';
    setTimeout(() => { input.focus(); input.select(); }, 50);
  } else {
    input.classList.add('readonly-odo');
    input.blur();
    btn.classList.remove('active');
    btn.textContent = '編集';
    updatePreview();
  }
}

// ── PREVIEW ──
function updatePreview() {
  const start = parseFloat(document.getElementById('f-odo-start').value);
  const end = parseFloat(document.getElementById('f-odo-end').value);
  const el = document.getElementById('preview-km');
  if (!isNaN(start) && !isNaN(end) && end > start) {
    el.textContent = (end - start).toFixed(1) + ' km';
  } else {
    el.textContent = '— km';
  }
}

// ── SAVE ──
async function saveRecord() {
  const date = document.getElementById('f-date').value;
  const purpose = document.getElementById('f-purpose').value.trim();
  const cat = getCategory();
  const start = parseFloat(document.getElementById('f-odo-start').value);
  const end = parseFloat(document.getElementById('f-odo-end').value);

  if (!date || !purpose || !cat) { toast('日付・目的・費用区分を入力してください'); return; }
  if (isNaN(start) || isNaN(end)) { toast('オドメーターを入力してください'); return; }
  if (end <= start) { toast('終了値は開始値より大きくしてください'); return; }

  const km = end - start;
  const cost = Math.round(km * RATE);
  const record = {
    id: Date.now(),
    date, purpose,
    category: cat,
    odoStart: start,
    odoEnd: end,
    km: parseFloat(km.toFixed(1)),
    cost
  };

  setLoading(true);
  try {
    await apiPost({ action: 'save', record });
    records.push(record);
    toast('記録しました ✓');

    document.getElementById('f-purpose').value = '';
    document.getElementById('f-odo-end').value = '';
    const startInput = document.getElementById('f-odo-start');
    startInput.value = end;
    startInput.classList.add('readonly-odo');
    document.querySelectorAll('.seg-btn').forEach(b => b.classList.remove('active'));
    updatePreview();

    if (editStartEnabled) {
      editStartEnabled = false;
      document.getElementById('edit-start-btn').classList.remove('active');
      document.getElementById('edit-start-btn').textContent = '編集';
    }
  } catch(e) {
    toast('保存に失敗しました');
  }
  setLoading(false);
}

// ── HISTORY ──
function renderHistory() {
  const wrap = document.getElementById('records-wrap');
  if (records.length === 0) {
    wrap.innerHTML = '<p class="empty-msg">NO RECORDS YET</p>';
    return;
  }
  const groups = {};
  [...records].reverse().forEach(r => {
    const m = r.date.slice(0, 7);
    if (!groups[m]) groups[m] = [];
    groups[m].push(r);
  });

  let html = '';
  Object.entries(groups).sort((a,b) => b[0].localeCompare(a[0])).forEach(([month, recs]) => {
    const [y, m] = month.split('-');
    html += `<div class="month-group"><div class="month-label">${y}年 ${parseInt(m)}月</div>`;
    recs.forEach(r => {
      html += `<div class="record-card ${r.category}">
        <div class="record-top">
          <span class="record-date">${formatDate(r.date)}</span>
          <span class="record-cat">${r.category}</span>
        </div>
        <div class="record-purpose">${escHtml(r.purpose)}</div>
        <div class="record-odo">${r.odoStart.toLocaleString()} → ${r.odoEnd.toLocaleString()} km</div>
        <div class="record-bottom">
          <span class="record-km">${r.km.toFixed(1)} km</span>
          <span class="record-cost">¥${r.cost.toLocaleString()}</span>
        </div>
        <div class="record-actions">
          <button class="action-btn" onclick="openEditModal(${r.id})">編集</button>
          <button class="action-btn danger" onclick="askDelete(${r.id})">削除</button>
        </div>
      </div>`;
    });
    html += `</div>`;
  });
  wrap.innerHTML = html;
}

// ── SUMMARY ──
function renderSummary() {
  const y = summaryMonth.getFullYear();
  const m = summaryMonth.getMonth() + 1;
  const key = `${y}-${String(m).padStart(2,'0')}`;
  document.getElementById('summary-month-label').textContent = `${y}年 ${m}月`;

  const monthRecs = records.filter(r => r.date.startsWith(key));
  const cats = ['法人', '個人事業', '私用'];
  const notes = {
    '法人': '参考値（法人業務のため精算不要）',
    '個人事業': '事業経費として計上',
    '私用': '自己負担'
  };

  let totalCost = 0;
  let cardsHtml = '';

  cats.forEach(cat => {
    const recs = monthRecs.filter(r => r.category === cat);
    const km = recs.reduce((s, r) => s + r.km, 0);
    const cost = recs.reduce((s, r) => s + r.cost, 0);
    if (cat !== '法人') totalCost += cost;
    cardsHtml += `<div class="summary-card ${cat}">
      <div class="sc-top">
        <span class="sc-label">${cat}</span>
        <span class="sc-km">${km.toFixed(1)} km · ${recs.length}件</span>
      </div>
      <div class="sc-cost">¥${cost.toLocaleString()}</div>
      <div class="sc-note">${notes[cat]}</div>
    </div>`;
  });

  let detailHtml = '';
  if (monthRecs.length > 0) {
    detailHtml = `<div class="detail-title">明細</div>`;
    [...monthRecs].reverse().forEach(r => {
      detailHtml += `<div class="record-card ${r.category}" style="margin-bottom:8px">
        <div class="record-top">
          <span class="record-date">${formatDate(r.date)}</span>
          <span class="record-cat">${r.category}</span>
        </div>
        <div class="record-purpose">${escHtml(r.purpose)}</div>
        <div class="record-bottom">
          <span class="record-km">${r.km.toFixed(1)} km</span>
          <span class="record-cost">¥${r.cost.toLocaleString()}</span>
        </div>
      </div>`;
    });
  }

  document.getElementById('summary-content').innerHTML = `
    <div class="summary-cards">${cardsHtml}</div>
    <div class="total-card">
      <div class="t-label">今月の振込額（個人事業 ＋ 私用）</div>
      <div class="t-amount">¥${totalCost.toLocaleString()}</div>
      <div style="font-size:11px;color:var(--text3);margin-top:6px;font-family:'DM Mono',monospace;">個人 → 法人への振込金額</div>
    </div>
    ${detailHtml}
  `;
}

function changeMonth(dir) {
  summaryMonth = new Date(summaryMonth.getFullYear(), summaryMonth.getMonth() + dir, 1);
  renderSummary();
}

// ── EDIT MODAL ──
function openEditModal(id) {
  const r = records.find(r => r.id === id);
  if (!r) return;
  editTargetId = id;

  document.getElementById('e-date').value = r.date;
  document.getElementById('e-purpose').value = r.purpose;
  document.getElementById('e-odo-start').value = r.odoStart;
  document.getElementById('e-odo-end').value = r.odoEnd;

  document.querySelectorAll('.edit-seg').forEach(b => {
    b.classList.toggle('active', b.dataset.v === r.category);
  });

  updateEditPreview();
  document.getElementById('editModalOverlay').classList.add('show');
}

function closeEditModal() {
  document.getElementById('editModalOverlay').classList.remove('show');
  editTargetId = null;
}

function selectEditCat(btn) {
  document.querySelectorAll('.edit-seg').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function updateEditPreview() {
  const start = parseFloat(document.getElementById('e-odo-start').value);
  const end = parseFloat(document.getElementById('e-odo-end').value);
  const el = document.getElementById('e-preview-km');
  if (!isNaN(start) && !isNaN(end) && end > start) {
    el.textContent = (end - start).toFixed(1) + ' km';
  } else {
    el.textContent = '— km';
  }
}

async function saveEdit() {
  const date = document.getElementById('e-date').value;
  const purpose = document.getElementById('e-purpose').value.trim();
  const cat = document.querySelector('.edit-seg.active')?.dataset.v;
  const start = parseFloat(document.getElementById('e-odo-start').value);
  const end = parseFloat(document.getElementById('e-odo-end').value);

  if (!date || !purpose || !cat) { toast('日付・目的・費用区分を入力してください'); return; }
  if (isNaN(start) || isNaN(end)) { toast('オドメーターを入力してください'); return; }
  if (end <= start) { toast('終了値は開始値より大きくしてください'); return; }

  const km = end - start;
  const cost = Math.round(km * RATE);
  const updated = {
    id: editTargetId, date, purpose, category: cat,
    odoStart: start, odoEnd: end,
    km: parseFloat(km.toFixed(1)), cost
  };

  try {
    await apiPost({ action: 'update', record: updated });
    records = records.map(r => r.id === editTargetId ? updated : r);
    closeEditModal();
    renderHistory();
    toast('更新しました ✓');
  } catch(e) {
    toast('更新に失敗しました');
  }
}

// ── DELETE ──
function askDelete(id) {
  deleteTargetId = id;
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
  deleteTargetId = null;
}
async function confirmDelete() {
  try {
    await apiPost({ action: 'delete', id: deleteTargetId });
    records = records.filter(r => r.id !== deleteTargetId);
    closeModal();
    renderHistory();
    toast('削除しました');
  } catch(e) {
    toast('削除に失敗しました');
  }
}

// ── CSV EXPORT ──
function exportCSV(mode) {
  const y = summaryMonth.getFullYear();
  const m = summaryMonth.getMonth() + 1;
  const key = `${y}-${String(m).padStart(2,'0')}`;
  const target = mode === 'month' ? records.filter(r => r.date.startsWith(key)) : [...records];
  if (target.length === 0) { toast('データがありません'); return; }

  const header = '日付,目的,費用区分,開始オドメーター,終了オドメーター,走行距離(km),金額(円)';
  const rows = target.map(r =>
    `${r.date},${r.purpose},${r.category},${r.odoStart},${r.odoEnd},${r.km},${r.cost}`
  );
  const csv = '\uFEFF' + [header, ...rows].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = mode === 'month' ? `走行記録_${y}年${m}月.csv` : `走行記録_全データ.csv`;
  a.click();
  URL.revokeObjectURL(url);
  toast('CSVを保存しました ✓');
}

// ── TOAST ──
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

// ── UTILS ──
function formatDate(s) {
  const d = new Date(s + 'T00:00:00');
  return `${d.getMonth()+1}/${d.getDate()}(${['日','月','火','水','木','金','土'][d.getDay()]})`;
}
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
